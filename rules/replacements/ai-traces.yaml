# AI 痕迹替换表
# 用途: Reviser anti-detect 模式 + Writer 写作约束 + Detector AI 痕迹检测参考
# 权威来源: rules/replacements/ai-traces.yaml（其他 Agent 引用，不复制）

replacements:
  - ai_pattern: "不得不承认"
    human_alternatives: ["说实话"]
    severity: warning

  - ai_pattern: "毋庸置疑"
    human_alternatives: ["毫无疑问"]
    severity: warning

  - ai_pattern: "显而易见"
    human_alternatives: ["一眼可见"]
    severity: warning

  - ai_pattern: "首先...其次...最后"
    human_alternatives: ["直接叙述"]
    severity: critical
    note: "列表式结构，与 D011 关联"

  - ai_pattern: "全场震惊"
    human_alternatives: ["具体描写每个人的反应"]
    severity: warning
    note: "集体反应套话，与 D008 关联"

  - ai_pattern: "仿佛"
    human_alternatives: ["像", "如同（少用）"]
    severity: warning
    note: "高疲劳词，与 D004 关联"

  - ai_pattern: "不禁"
    human_alternatives: ["（删除，直接描写）", "没忍住", "下意识"]
    severity: warning
    note: "高疲劳词，与 D004 关联"

  - ai_pattern: "竟然"
    human_alternatives: ["（删除，或用其他表达）"]
    severity: warning
    note: "高疲劳词，与 D004 关联"

  - ai_pattern: "不是不想，是..."
    human_alternatives: ["直接写结果/实际状态，跳过否定铺垫"]
    severity: critical
    note: "反标签句式，与 D001 v2 关联。例：'不是不想，是乱得组织不起'→'脑子里乱成一团'"

  - ai_pattern: "第X件事/第X课"
    human_alternatives: ["删除编号，直接写感悟/行为"]
    severity: warning
    note: "编号式自我总结，与 D023 关联。例：'人生教会他的第一件事'→直接展示行为"

  - ai_pattern: "像一面...的旗/像...的..."
    human_alternatives: ["减少明喻，让部分描写裸奔（不带比喻）"]
    severity: warning
    note: "明喻过密，与 D022 关联。不是每个感受都需要比喻"
